services:
  # Web Service
  - type: web
    name: task-management-api
    runtime: docker
    plan: free # Change to pro if you need disk or more memory
    region: frankfurt
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: task-database
          property: connectionString
      - key: APP_KEY
        generateValue: true # This will generate a new key if not provided, but better to set manually
      - key: LOG_CHANNEL
        value: errorlog

databases:
  - name: task-database
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
